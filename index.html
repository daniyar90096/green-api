<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <main class="main-content">
            <section class="panel left-panel">

                <div class="form-group">
                    <label for="idInstance">ID инстанса</label>
                    <input
                        type="text"
                        id="idInstance"
                        placeholder="Введите ID инстанса"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group password-group">
                    <label for="apiTokenInstance">Apitoken инстанса</label>
                    <div class="password-input-wrapper">
                        <input
                            type="password"
                            id="apiTokenInstance"
                            placeholder="Введите Apitoken инстанса"
                            autocomplete="off"
                        >
                        <button
                            type="button"
                            class="toggle-password"
                            id="btnToggleTokenVisibility"
                            aria-label="Показать или скрыть Apitoken"
                        >
                            👁
                        </button>
                    </div>
                </div>

                <div class="methods-grid">
                    <button class="btn btn-primary" id="btnGetSettings">
                        Получить настройки
                    </button>
                    <button class="btn btn-primary" id="btnGetStateInstance">
                        Получить состояние
                    </button>
                </div>

                <div class="method-block">
                    <h3>Отправка сообщения</h3>
                    <div class="form-group">
                        <label for="phoneMessage">Номер телефона</label>
                        <input
                            type="text"
                            id="phoneMessage"
                            placeholder="79001234567"
                            autocomplete="off"
                            inputmode="numeric"
                            pattern="\d*"
                            maxlength="11"
                        >
                    </div>
                    <div class="form-group">
                        <label for="messageText">Сообщение</label>
                        <textarea
                            id="messageText"
                            rows="3"
                            placeholder="Текст сообщения"
                        ></textarea>
                    </div>
                    <button class="btn btn-success" id="btnSendMessage">
                        Отправить сообщение
                    </button>
                </div>

                <div class="method-block">
                    <div class="form-group">
                        <label for="phoneFile">Номер телефона</label>
                        <input
                            type="text"
                            id="phoneFile"
                            placeholder="79001234567"
                            autocomplete="off"
                            inputmode="numeric"
                            pattern="\d*"
                            maxlength="11"
                        >
                    </div>
                    <div class="form-group">
                        <label for="fileUrl">URL файла</label>
                        <input
                            type="text"
                            id="fileUrl"
                            placeholder="https://example.com/file.jpg"
                            autocomplete="off"
                        >
                    </div>
                    <button class="btn btn-success" id="btnSendFileByUrl">
                        Отправить файл по ссылке
                    </button>
                </div>
            </section>

            <section class="panel right-panel">
                <div class="response-header">
                    <h2>Ответ</h2>
                </div>
                <textarea
                    id="responseField"
                    class="response-field"
                    readonly
                    placeholder="Здесь будет отображен ответ"
                ></textarea>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
